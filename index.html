<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Happy 20th Birthday ♡</title>
  <meta name="description" content="A romantic birthday lyric visualizer with beautiful animations">
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Outfit', sans-serif;
      background: #0d0a1a;
      overflow: hidden;
      width: 100vw;
      height: 100dvh;
      position: relative;
    }

    /* ── Canvas ── */
    #heartCanvas {
      position: fixed;
      inset: 0;
      z-index: 0;
      width: 100%;
      height: 100%;
    }

    /* ── Progress Bar ── */
    #progressWrap {
      position: fixed;
      top: 0; left: 0; right: 0;
      height: 4px;
      background: rgba(255,255,255,0.08);
      z-index: 100;
      opacity: 0;
      transition: opacity 0.6s;
    }
    #progressBar {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, #f9a8d4, #c084fc, #f9a8d4);
      background-size: 200% 100%;
      animation: shimmer 2s linear infinite;
      border-radius: 0 2px 2px 0;
      transition: width 0.3s linear;
    }
    @keyframes shimmer {
      0% { background-position: 200% 0; }
      100% { background-position: -200% 0; }
    }

    /* ── Play Button ── */
    #playBtn {
      position: fixed;
      inset: 0;
      z-index: 50;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 1.2rem;
      background: radial-gradient(ellipse at center, rgba(20,10,40,0.95), #0d0a1a);
      cursor: not-allowed;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.5s ease;
      -webkit-tap-highlight-color: transparent;
    }
    #playBtn.ready {
      opacity: 1;
      pointer-events: auto;
      cursor: pointer;
    }
    #playBtn.hiding {
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.8s ease;
    }

    .play-ring {
      width: 100px; height: 100px;
      border-radius: 50%;
      border: 2.5px solid rgba(249,168,212,0.35);
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      transition: transform 0.3s, box-shadow 0.3s;
      animation: ringPulse 2.5s ease-in-out infinite;
    }
    #playBtn.ready .play-ring:active {
      transform: scale(0.95);
    }
    @keyframes ringPulse {
      0%, 100% { box-shadow: 0 0 0 0 rgba(249,168,212,0.15); }
      50% { box-shadow: 0 0 0 18px rgba(249,168,212,0); }
    }

    .play-triangle {
      width: 0; height: 0;
      border-style: solid;
      border-width: 16px 0 16px 28px;
      border-color: transparent transparent transparent #f9a8d4;
      margin-left: 5px;
      filter: drop-shadow(0 0 8px rgba(249,168,212,0.4));
    }

    .play-label {
      font-size: 0.8rem;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: rgba(249,168,212,0.6);
      font-weight: 600;
    }

    /* ── Volume Reminder ── */
    .volume-hint {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      margin-top: 1.5rem;
      opacity: 0;
      transition: opacity 0.8s ease 0.3s;
    }
    #playBtn.ready .volume-hint {
      opacity: 1;
    }
    .volume-icon {
      width: 20px;
      height: 20px;
      animation: volumePulse 2s ease-in-out infinite;
    }
    @keyframes volumePulse {
      0%, 100% { opacity: 0.5; transform: scale(1); }
      50% { opacity: 1; transform: scale(1.15); }
    }
    .volume-text {
      font-size: 0.65rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: rgba(249,168,212,0.4);
      font-weight: 500;
    }

    .loading-label {
      font-size: 0.75rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: rgba(249,168,212,0.35);
      font-weight: 600;
      position: fixed;
      bottom: 2rem;
      left: 50%;
      transform: translateX(-50%);
      z-index: 51;
    }
    .loading-dots::after {
      content: '';
      animation: dots 1.5s steps(4, end) infinite;
    }
    @keyframes dots {
      0% { content: ''; }
      25% { content: '.'; }
      50% { content: '..'; }
      75% { content: '...'; }
    }

    /* ── Lyric Container ── */
    #lyricStage {
      position: fixed;
      inset: 0;
      z-index: 10;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.2rem;
      pointer-events: none;
    }

    #lyricText {
      text-align: center;
      font-weight: 800;
      font-size: clamp(1.8rem, 11vw, 5rem);
      line-height: 1.2;
      color: transparent;
      background: linear-gradient(135deg, #fda4af, #f9a8d4, #c4b5fd, #a5b4fc, #f9a8d4);
      background-size: 300% 300%;
      -webkit-background-clip: text;
      background-clip: text;
      animation: gradientShift 6s ease infinite;
      text-shadow: none;
      max-width: 92vw;
      word-break: break-word;
      transition: justify-content 0.4s, text-align 0.4s;
    }

    #lyricText.align-left {
      text-align: left;
      width: 100%;
      padding-left: 1rem;
      padding-right: 20%;
    }
    #lyricText.align-right {
      text-align: right;
      width: 100%;
      padding-right: 1rem;
      padding-left: 20%;
    }

    @keyframes gradientShift {
      0%, 100% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
    }

    /* ── Character Span ── */
    .char-span {
      display: inline-block;
      opacity: 0;
      transform: scale(0);
      /* Claymorphic 3D text shadow on individual chars */
      text-shadow:
        0 1px 0 #fecdd3,
        0 2px 0 #fda4af,
        0 3px 0 #fb7185,
        0 4px 6px rgba(244,114,182,0.25),
        0 0 20px rgba(249,168,212,0.15);
      color: transparent;
      background: inherit;
      -webkit-background-clip: text;
      background-clip: text;
    }
    .char-span.visible {
      animation: charPopIn 0.35s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
    }

    @keyframes charPopIn {
      0% { opacity: 0; transform: scale(0) translateY(10px); }
      60% { opacity: 1; transform: scale(1.25) translateY(-3px); }
      100% { opacity: 1; transform: scale(1) translateY(0); }
    }

    /* ── Wave Effect ── */
    .wave-char {
      animation: waveFloat 1.8s ease-in-out infinite;
    }
    @keyframes waveFloat {
      0%, 100% { transform: translateY(0) scale(1); }
      50% { transform: translateY(-18px) scale(1.05); }
    }

    /* ── Pulse Effect ── */
    .pulse-text {
      animation: pulseGlow 0.6s ease-in-out infinite alternate;
    }
    @keyframes pulseGlow {
      0% {
        transform: scale(1);
        filter: brightness(1);
      }
      100% {
        transform: scale(1.12);
        filter: brightness(1.35);
      }
    }

    /* ── Pop Effect ── */
    .pop-text {
      animation: popBounce 0.8s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
    }
    @keyframes popBounce {
      0% { transform: scale(0) rotate(-15deg); opacity: 0; }
      50% { transform: scale(1.4) rotate(5deg); opacity: 1; }
      70% { transform: scale(0.9) rotate(-2deg); }
      100% { transform: scale(1) rotate(0deg); opacity: 1; }
    }

    /* ── Climax burst overlay ── */
    .burst-heart {
      position: fixed;
      z-index: 15;
      pointer-events: none;
      font-size: 1.5rem;
      animation: burstOut 1.8s ease-out forwards;
    }
    @keyframes burstOut {
      0% {
        opacity: 1;
        transform: translate(0, 0) scale(0.5) rotate(0deg);
      }
      100% {
        opacity: 0;
        transform: translate(var(--bx), var(--by)) scale(1.5) rotate(var(--br));
      }
    }

    /* ── Fade-out for lyric line ── */
    .lyric-fade-out {
      animation: fadeOutScale 0.45s ease-in forwards;
    }
    @keyframes fadeOutScale {
      0% { opacity: 1; transform: scale(1); }
      100% { opacity: 0; transform: scale(0.85); }
    }

    /* ── End Screen ── */
    #endScreen {
      position: fixed;
      inset: 0;
      z-index: 60;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 0.8rem;
      background: radial-gradient(ellipse at center, rgba(20,10,40,0.97), #0d0a1a);
      opacity: 0;
      pointer-events: none;
      transition: opacity 1.2s ease;
    }
    #endScreen.visible {
      opacity: 1;
      pointer-events: auto;
    }
    .end-heart {
      font-size: 3rem;
      animation: endFloat 3s ease-in-out infinite;
    }
    @keyframes endFloat {
      0%, 100% { transform: translateY(0) scale(1); }
      50% { transform: translateY(-12px) scale(1.1); }
    }
    .end-text {
      font-size: 1.1rem;
      color: rgba(249,168,212,0.5);
      letter-spacing: 0.15em;
      font-weight: 600;
    }

    /* ── Responsive — phone-first ── */
    @media (max-width: 480px) {
      #lyricText {
        font-size: clamp(1.6rem, 11vw, 2.8rem);
        max-width: 95vw;
        padding: 0 0.4rem;
      }
      #lyricText.align-left {
        padding-right: 8%;
        padding-left: 0.6rem;
      }
      #lyricText.align-right {
        padding-left: 8%;
        padding-right: 0.6rem;
      }
      .play-ring {
        width: 88px; height: 88px;
      }
      .play-triangle {
        border-width: 13px 0 13px 22px;
      }
      .volume-text {
        font-size: 0.6rem;
      }
      .burst-heart {
        font-size: 1.2rem;
      }
    }

    /* Extra small phones */
    @media (max-width: 360px) {
      #lyricText {
        font-size: clamp(1.3rem, 10vw, 2.2rem);
      }
      .play-ring {
        width: 76px; height: 76px;
      }
      .play-triangle {
        border-width: 11px 0 11px 19px;
      }
    }
  </style>
</head>
<body>
  <!-- Canvas for floating hearts -->
  <canvas id="heartCanvas"></canvas>

  <!-- Progress bar -->
  <div id="progressWrap">
    <div id="progressBar"></div>
  </div>

  <!-- Loading indicator -->
  <div id="loadingLabel" class="loading-label">
    <span>Loading audio</span><span class="loading-dots"></span>
  </div>

  <!-- Play button overlay -->
  <div id="playBtn">
    <div class="play-ring">
      <div class="play-triangle"></div>
    </div>
    <div class="play-label">Press to Play</div>
    <div class="volume-hint">
      <svg class="volume-icon" viewBox="0 0 24 24" fill="none" stroke="rgba(249,168,212,0.5)" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/>
        <path d="M15.54 8.46a5 5 0 0 1 0 7.07"/>
        <path d="M19.07 4.93a10 10 0 0 1 0 14.14"/>
      </svg>
      <span class="volume-text">Turn up your volume</span>
    </div>
  </div>

  <!-- Lyric display -->
  <div id="lyricStage">
    <div id="lyricText"></div>
  </div>

  <!-- End screen -->
  <div id="endScreen">
    <div class="end-heart">♡</div>
    <div class="end-text">Happy Birthday, Chagi ♡</div>
  </div>

  <script>
    // ═══════════════════════════════════════
    //  LYRIC TIMELINE — Total = 149,000ms (2:29)
    // ═══════════════════════════════════════
    const lyricTimeline = [
      { text: "Happy", duration: 4000, charSpeed: 1.2 },
      { text: "Birthday", duration: 4000, charSpeed: 1.2 },
      { text: "to", duration: 2500, charSpeed: 1.0 },
      { text: "You", duration: 7500, charSpeed: 1.2, effect: "climax" },

      { text: "Chagiii", duration: 1800, charSpeed: 2.5 },

      { text: "yang", duration: 3500, charSpeed: 1.0 },
      { text: "sekarang", duration: 5000, charSpeed: 1.2 },
      { text: "sudah", duration: 3500, charSpeed: 1.0 },
      { text: "20", duration: 4000, charSpeed: 0.8 },
      { text: "20", duration: 8000, charSpeed: 0.8, effect: "morph" },
      { text: "( ˶°ㅁ°) !!", duration: 5000, charSpeed: 1.5, effect: "pop" },
      { text: "tambah lucu lagi ya", duration: 5500, charSpeed: 1.3 },
      { text: "dan semoga semuanya lancar", duration: 6000, charSpeed: 1.3 },
      { text: "biar kamu ga kebanyakan pikiran", duration: 7000, charSpeed: 1.4 },
      { text: "jangan", duration: 4000, charSpeed: 1.0 },
      { text: "nakal..", duration: 4500, charSpeed: 1.0 },
      { text: "nakal", duration: 4500, charSpeed: 1.0, effect: "side-left" },
      { text: "ya", duration: 3500, charSpeed: 1.0 },
      { text: "udah gede", duration: 5500, charSpeed: 1.2 },
      { text: "⸜(｡˃ ᵕ ˂ )⸝♡", duration: 8000, charSpeed: 1.5, effect: "climax" },
      { text: "eman banget ga bisa ketemu", duration: 8000, charSpeed: 1.5 },
      { text: "bikin kangen aja", duration: 7000, charSpeed: 1.3 },
      { text: "cepet balik surabaya", duration: 7500, charSpeed: 1.4 },
      { text: "yaaaaaaaaaaaaaaaaaaaaaaa..............................", duration: 13000, charSpeed: 3.0, effect: "side-right" },
      { text: "cHagii", duration: 1800, charSpeed: 2.5 },
      { text: "chAgii", duration: 1800, charSpeed: 2.5 },
      { text: "chaGii", duration: 1800, charSpeed: 2.5 },
      { text: "chagIi", duration: 1800, charSpeed: 2.5 },
      { text: "chagiI", duration: 2500, charSpeed: 2.5, effect: "wave" },
      { text: "CHAGII", duration: 4500, charSpeed: 3.0, effect: "pulse" }
    ];

    // Verify total
    const TOTAL_MS = lyricTimeline.reduce((s, l) => s + l.duration, 0);
    console.log(`Total duration: ${TOTAL_MS}ms = ${(TOTAL_MS/1000).toFixed(1)}s`);

    // ═══════════════════════════════════════
    //  AUDIO SETUP
    // ═══════════════════════════════════════
    const audio = new Audio();
    const playBtn = document.getElementById('playBtn');
    const loadingLabel = document.getElementById('loadingLabel');
    const progressWrap = document.getElementById('progressWrap');
    const progressBar = document.getElementById('progressBar');
    const lyricText = document.getElementById('lyricText');
    const endScreen = document.getElementById('endScreen');

    let audioReady = false;

    audio.preload = 'auto';
    audio.src = 'liebestraum_ending.mp3';

    audio.addEventListener('canplaythrough', () => {
      if (!audioReady) {
        audioReady = true;
        loadingLabel.style.opacity = '0';
        setTimeout(() => { loadingLabel.style.display = 'none'; }, 500);
        playBtn.classList.add('ready');
      }
    }, { once: true });

    // Fallback if canplaythrough doesn't fire
    audio.addEventListener('loadeddata', () => {
      if (!audioReady && audio.readyState >= 3) {
        audioReady = true;
        loadingLabel.style.opacity = '0';
        setTimeout(() => { loadingLabel.style.display = 'none'; }, 500);
        playBtn.classList.add('ready');
      }
    });

    // ═══════════════════════════════════════
    //  HEART PARTICLE CANVAS
    // ═══════════════════════════════════════
    const canvas = document.getElementById('heartCanvas');
    const ctx = canvas.getContext('2d');
    let hearts = [];
    let canvasW, canvasH;

    function resizeCanvas() {
      canvasW = canvas.width = window.innerWidth;
      canvasH = canvas.height = window.innerHeight;
    }
    window.addEventListener('resize', resizeCanvas);
    resizeCanvas();

    function drawHeart(cx, cy, size) {
      ctx.beginPath();
      const topY = cy - size * 0.4;
      ctx.moveTo(cx, cy + size * 0.6);
      // Left curve
      ctx.bezierCurveTo(cx - size, cy, cx - size, topY, cx, topY + size * 0.2);
      // Right curve
      ctx.bezierCurveTo(cx + size, topY, cx + size, cy, cx, cy + size * 0.6);
      ctx.closePath();
    }

    function spawnHeart() {
      const palettes = [
        'rgba(249,168,212,',  // pink
        'rgba(196,181,253,',  // lavender
        'rgba(253,164,175,',  // rose
        'rgba(165,180,252,',  // periwinkle
        'rgba(251,191,236,',  // light pink
      ];
      return {
        x: Math.random() * canvasW,
        y: canvasH + 20,
        size: 6 + Math.random() * 14,
        speed: 0.25 + Math.random() * 0.6,
        drift: (Math.random() - 0.5) * 0.4,
        opacity: 0.08 + Math.random() * 0.18,
        color: palettes[Math.floor(Math.random() * palettes.length)],
        rotation: Math.random() * Math.PI * 2,
        rotSpeed: (Math.random() - 0.5) * 0.01,
        pulse: Math.random() * Math.PI * 2,
      };
    }

    // Initial hearts
    for (let i = 0; i < 35; i++) {
      const h = spawnHeart();
      h.y = Math.random() * canvasH;
      hearts.push(h);
    }

    let climaxBurstActive = false;

    function animateCanvas() {
      ctx.clearRect(0, 0, canvasW, canvasH);

      // Spawn new hearts occasionally
      if (Math.random() < 0.06 && hearts.length < 60) {
        hearts.push(spawnHeart());
      }

      for (let i = hearts.length - 1; i >= 0; i--) {
        const h = hearts[i];
        h.y -= h.speed;
        h.x += h.drift;
        h.rotation += h.rotSpeed;
        h.pulse += 0.02;

        // Slight size pulsing
        const pSize = h.size + Math.sin(h.pulse) * 1.5;

        if (h.y < -30) {
          hearts.splice(i, 1);
          continue;
        }

        ctx.save();
        ctx.translate(h.x, h.y);
        ctx.rotate(h.rotation);
        ctx.globalAlpha = h.opacity;

        drawHeart(0, 0, pSize);
        ctx.fillStyle = h.color + h.opacity + ')';
        ctx.fill();

        ctx.restore();
      }

      requestAnimationFrame(animateCanvas);
    }
    animateCanvas();

    // ═══════════════════════════════════════
    //  CLIMAX BURST — exploding hearts
    // ═══════════════════════════════════════
    function triggerClimaxBurst() {
      const symbols = ['♡', '❤', '💕', '💖', '✨', '💗', '♥', '💓'];
      const cx = window.innerWidth / 2;
      const cy = window.innerHeight / 2;
      const count = 30 + Math.floor(Math.random() * 15);

      for (let i = 0; i < count; i++) {
        const el = document.createElement('div');
        el.className = 'burst-heart';
        el.textContent = symbols[Math.floor(Math.random() * symbols.length)];

        const angle = (Math.PI * 2 * i) / count + (Math.random() - 0.5) * 0.5;
        const dist = 120 + Math.random() * 280;
        const bx = Math.cos(angle) * dist;
        const by = Math.sin(angle) * dist;
        const br = (Math.random() - 0.5) * 720;

        el.style.left = cx + 'px';
        el.style.top = cy + 'px';
        el.style.setProperty('--bx', bx + 'px');
        el.style.setProperty('--by', by + 'px');
        el.style.setProperty('--br', br + 'deg');
        el.style.fontSize = (1 + Math.random() * 1.5) + 'rem';
        el.style.animationDelay = (Math.random() * 0.15) + 's';

        document.body.appendChild(el);
        setTimeout(() => el.remove(), 2200);
      }

      // Also boost canvas hearts
      for (let i = 0; i < 20; i++) {
        const h = spawnHeart();
        h.y = canvasH / 2;
        h.x = canvasW / 2 + (Math.random() - 0.5) * 200;
        h.speed = 1 + Math.random() * 2;
        h.opacity = 0.2 + Math.random() * 0.2;
        hearts.push(h);
      }
    }

    // ═══════════════════════════════════════
    //  DISPLAY LYRIC LINE
    // ═══════════════════════════════════════
    let currentLine = 0;
    let lineTimeout = null;
    let morphInterval = null;
    let isPlaying = false;
    let startTime = 0;

    function clearMorphInterval() {
      if (morphInterval) {
        clearInterval(morphInterval);
        morphInterval = null;
      }
    }

    function displayLine(index) {
      if (index >= lyricTimeline.length) {
        finishShow();
        return;
      }

      const line = lyricTimeline[index];
      currentLine = index;

      // Reset classes
      lyricText.className = '';
      clearMorphInterval();

      // Handle alignment effects
      if (line.effect === 'side-left') {
        lyricText.classList.add('align-left');
      } else if (line.effect === 'side-right') {
        lyricText.classList.add('align-right');
      }

      // Handle morph effect (special — cycles through variants)
      if (line.effect === 'morph') {
        handleMorphEffect(line);
        return;
      }

      // Handle pop effect
      if (line.effect === 'pop') {
        lyricText.innerHTML = '';
        const span = document.createElement('span');
        span.textContent = line.text;
        span.style.display = 'inline-block';
        span.style.opacity = '1';
        span.classList.add('pop-text');
        // Apply clay shadow
        span.style.textShadow = `
          0 1px 0 #fecdd3,
          0 2px 0 #fda4af,
          0 3px 0 #fb7185,
          0 4px 6px rgba(244,114,182,0.25),
          0 0 20px rgba(249,168,212,0.15)`;
        span.style.color = 'transparent';
        span.style.background = 'inherit';
        span.style.webkitBackgroundClip = 'text';
        span.style.backgroundClip = 'text';
        lyricText.appendChild(span);

        scheduleNext(index, line.duration);
        return;
      }

      // Default: character pop-in
      renderCharsPopIn(line.text, line.charSpeed, line.effect);

      // Trigger effect after chars appear
      if (line.effect === 'climax') {
        const charTime = line.text.length * (60 / line.charSpeed);
        setTimeout(() => triggerClimaxBurst(), Math.min(charTime + 200, line.duration * 0.5));
      }

      if (line.effect === 'pulse') {
        const charTime = line.text.length * (60 / line.charSpeed);
        setTimeout(() => {
          lyricText.classList.add('pulse-text');
        }, charTime + 100);
      }

      scheduleNext(index, line.duration);
    }

    function renderCharsPopIn(text, charSpeed, effect) {
      lyricText.innerHTML = '';
      const baseDelay = 60 / charSpeed; // ms per character

      [...text].forEach((char, i) => {
        const span = document.createElement('span');
        span.className = 'char-span';
        span.textContent = char === ' ' ? '\u00A0' : char;

        // Wave effect: add staggered animation after pop-in
        if (effect === 'wave') {
          const waveDelay = i * 0.1;
          setTimeout(() => {
            span.classList.add('wave-char');
            span.style.animationDelay = waveDelay + 's';
          }, baseDelay * i + 350);
        }

        lyricText.appendChild(span);

        // Trigger pop-in with stagger
        setTimeout(() => {
          span.classList.add('visible');
        }, baseDelay * i);
      });
    }

    function handleMorphEffect(line) {
      const morphVariants = [
        '20',
        '🎂 20 🎂',
        'TWENTY',
        '✨20✨',
        '🎉 T·W·E·N·T·Y 🎉',
        '②⓪',
      ];
      let morphIndex = 0;

      // Show first variant immediately with pop-in
      renderCharsPopIn(morphVariants[0], line.charSpeed);

      morphInterval = setInterval(() => {
        morphIndex = (morphIndex + 1) % morphVariants.length;
        renderCharsPopIn(morphVariants[morphIndex], 4.0); // fast char speed for morph
      }, 500);

      scheduleNext(currentLine, line.duration);
    }

    function scheduleNext(index, duration) {
      const fadeOutTime = 450;
      lineTimeout = setTimeout(() => {
        // Fade out current
        lyricText.classList.add('lyric-fade-out');

        setTimeout(() => {
          lyricText.classList.remove('lyric-fade-out');
          clearMorphInterval();
          displayLine(index + 1);
        }, fadeOutTime);
      }, duration - fadeOutTime);
    }

    // ═══════════════════════════════════════
    //  PROGRESS BAR UPDATE
    // ═══════════════════════════════════════
    function updateProgress() {
      if (!isPlaying) return;
      const elapsed = Date.now() - startTime;
      const pct = Math.min((elapsed / TOTAL_MS) * 100, 100);
      progressBar.style.width = pct + '%';
      if (pct < 100) {
        requestAnimationFrame(updateProgress);
      }
    }

    // ═══════════════════════════════════════
    //  FINISH
    // ═══════════════════════════════════════
    function finishShow() {
      isPlaying = false;
      lyricText.innerHTML = '';
      progressBar.style.width = '100%';
      setTimeout(() => {
        progressWrap.style.opacity = '0';
        endScreen.classList.add('visible');
      }, 600);
    }

    // ═══════════════════════════════════════
    //  PLAY BUTTON HANDLER
    // ═══════════════════════════════════════
    playBtn.addEventListener('click', () => {
      if (!audioReady) return;

      playBtn.classList.add('hiding');
      setTimeout(() => { playBtn.style.display = 'none'; }, 800);

      // Show progress bar
      progressWrap.style.opacity = '1';

      // Start audio
      audio.currentTime = 0;
      audio.play().catch(e => console.warn('Audio play failed:', e));

      // Start lyric timeline
      isPlaying = true;
      startTime = Date.now();
      updateProgress();
      displayLine(0);
    });
  </script>
</body>
</html>
